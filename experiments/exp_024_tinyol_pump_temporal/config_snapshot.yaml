exp_id: exp_024_tinyol_pump_temporal
backbone:
  input_dim: 25
  encoder_dims:
  - 32
  - 16
  - 8
  activation: relu
  checkpoint_path: experiments/exp_003_tinyol_dataset1/backbone.pt
  decoder_dims:
  - 16
  - 32
  - 25
pretrain:
  optimizer: adam
  learning_rate: 0.001
  epochs: 50
  batch_size: 64
  loss: mse
  seed: 42
  pretrain_fraction: 0.3
  val_fraction: 0.1
oto_head:
  input_dim: 9
  output_dim: 1
  optimizer: sgd
  learning_rate: 0.01
  momentum: 0.0
  loss: bce
data:
  dataset: pump_maintenance
  csv_path: data/raw/pump_maintenance/Large Industrial_Pump_Maintenance_Dataset/Large_Industrial_Pump_Maintenance_Dataset.csv
  timestamp_column: timestamp
  feature_columns:
  - temperature
  - vibration
  - pressure
  - rpm
  label_column: maintenance_required
  normalizer_path: configs/pump_normalizer.yaml
  window_size: 32
  step_size: 16
  features_per_channel:
  - mean
  - std
  - rms
  - kurtosis
  - peak
  - crest_factor
  n_tasks: 4
  task_strategy: chronological
  task_split: by_temporal_window
  entries_per_task: 5000
  temporal_col: Operational_Hours
  label_col: Maintenance_Flag
  feature_cols:
  - temperature
  - vibration
  - pressure
  - rpm
  val_ratio: 0.2
  test_split: 0.2
uint8_buffer:
  enabled: false
  size: 50
  embed_dim: 8
evaluation:
  seed: 42
  metrics:
  - aa
  - af
  - bwt
  - ram_peak_bytes
  - n_params
  - inference_latency_ms
  output_dir: experiments/exp_024_tinyol_pump_temporal/results
memory:
  target_ram_bytes: 65536
  expected_ram_bytes: 7168
  warn_if_above_bytes: 52000
