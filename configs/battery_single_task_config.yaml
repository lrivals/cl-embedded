# configs/battery_single_task_config.yaml
# Baseline single-task — Dataset 4 Battery RUL (tous cycles fusionnés)
# MEM: pas de tâches séquentielles, split train/val/test global stratifié
# Usage : --data_config configs/battery_single_task_config.yaml

dataset:
  name: battery_rul
  task_split: "no_split"
  test_ratio: 0.2
  val_ratio: 0.1         # sur le train uniquement
  seed: 42
  rul_failure_threshold: 200

paths:
  csv_path: "data/raw/Battery Remaining Useful Life (RUL)/Battery_RUL.csv"

data:
  dataset: battery_rul
  task_split: "no_split"
  csv_path: "data/raw/Battery Remaining Useful Life (RUL)/Battery_RUL.csv"
  test_ratio: 0.2
  val_ratio: 0.1
  rul_failure_threshold: 200
  seed: 42
  n_features: 7
  n_classes: 2
  feature_columns:
    - "Discharge Time (s)"
    - "Decrement 3.6-3.4V (s)"
    - "Max. Voltage Dischar. (V)"
    - "Min. Voltage Charg. (V)"
    - "Time at 4.15V (s)"
    - "Time constant current (s)"
    - "Charging time (s)"
