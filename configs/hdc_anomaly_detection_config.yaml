# configs/hdc_anomaly_detection_config.yaml
# HDCClassifier en mode one-class pour le scénario anomaly detection.
# Entraînement sur données normales (faulty=0) uniquement.
# NE PAS modifier les valeurs directement dans le code source.

exp_id: "exp_086_hdc_monitoring_anomaly_detection"

# --- Mode anomaly detection ---
one_class_mode: true
anomaly_percentile: 95
anomaly_threshold: null  # calculé automatiquement sur Task 1 (Pump faulty=0)

hdc:
  D: 1024
  n_levels: 10
  seed: 42
  base_vectors_path: "configs/hdc_base_vectors.npz"

data:
  dataset: "equipment_monitoring"
  csv_path: "data/raw/equipment_monitoring/Industrial_Equipment_Monitoring_Dataset/equipment_anomaly_data.csv"
  normalizer_path: "configs/monitoring_normalizer_anomaly.yaml"
  n_features: 4
  n_classes: 2  # conservé pour compatibilité — n_proto=1 en one_class_mode
  domain_column: "equipment"
  domain_order: ["Pump", "Turbine", "Compressor"]
  label_column: "faulty"
  feature_columns: ["temperature", "pressure", "vibration", "humidity"]

# Bornes calculées sur Task 1 (Pump) — inchangées par rapport à hdc_config.yaml
feature_bounds:
  temperature: [-3.8249363899230957, 4.989019870758057]
  pressure: [-2.898953437805176, 4.20745325088501]
  vibration: [-2.757283926010132, 4.817769527435303]
  humidity: [-3.3623745441436768, 3.3421783447265625]

evaluation:
  seed: 42
  metrics: ["avg_auroc", "auroc_forgetting", "auroc_bwt", "ram_peak_bytes", "n_params"]
  output_dir: "experiments/exp_086_hdc_monitoring_anomaly_detection/results/"

memory:
  target_ram_bytes: 65536
  expected_ram_bytes: 10248  # ~10 Ko FP32 (1 prototype au lieu de 2)
  warn_if_above_bytes: 52000
