# configs/tinyol_pronostia_single_task_config.yaml
# Baseline single-task TinyOL — Dataset 3 FEMTO PRONOSTIA (toutes conditions fusionnées)
# Exp : exp_046_tinyol_pronostia_no_split
# NE PAS modifier directement : créer une copie pour chaque variante expérimentale.

exp_id: "exp_046_tinyol_pronostia_no_split"

backbone:
  input_dim: 13          # 13 features Pronostia (vs 25 pour pump)
                         # MEM: 13 × 4 B = 52 B (entrée)
  encoder_dims: [16, 8]  # 13→16→8 (allégé vs pump pour respecter 64 Ko)
  activation: "relu"
  checkpoint_path: "experiments/exp_046_tinyol_pronostia_no_split/backbone.pt"

  decoder_dims: [16, 13]  # 8→16→13 (décodeur symétrique)

pretrain:
  optimizer: "adam"
  learning_rate: 0.001
  epochs: 50
  batch_size: 64
  loss: "mse"
  seed: 42
  pretrain_fraction: 0.3   # 30% premières fenêtres = état sain (début de vie roulement)
  val_fraction: 0.1

oto_head:
  input_dim: 9           # embedding (8D) + MSE scalaire = 9
  output_dim: 1
  optimizer: "sgd"
  learning_rate: 0.01
  momentum: 0.0
  loss: "bce"

dataset:
  name: pronostia
  task_split: "no_split"
  test_ratio: 0.2
  val_ratio: 0.1
  seed: 42
  window_size: 2560
  step_size: 2560
  failure_ratio: 0.10

paths:
  npy_dir: "data/raw/Pronostia dataset/binaries"

data:
  dataset: pronostia
  task_split: "no_split"
  npy_dir: "data/raw/Pronostia dataset/binaries"
  test_ratio: 0.2
  val_ratio: 0.1
  window_size: 2560
  step_size: 2560
  failure_ratio: 0.10
  seed: 42
  n_features: 13
  n_classes: 2
  feature_columns:
    - acc_horiz
    - acc_vert

uint8_buffer:
  enabled: false
  size: 50
  embed_dim: 8
  # RAM buffer : 50 × 8 × 1 = 400 B + labels 50 B = ~450 B

evaluation:
  seed: 42
  metrics: ["aa", "af", "bwt", "ram_peak_bytes", "n_params", "inference_latency_ms"]
  output_dir: "experiments/exp_046_tinyol_pronostia_no_split/results/"

memory:
  target_ram_bytes: 65536
  expected_ram_bytes: 7168  # ~7 Ko (tête OtO + activations ; backbone en Flash)
  warn_if_above_bytes: 52000
