# configs/battery_config.yaml
# Dataset 4 — Battery Remaining Useful Life (Degradation binaire)
# Scénario CL : Domain-Incremental par fenêtres temporelles (3 tâches de cycles)
# NE PAS modifier directement : créer une copie pour chaque variante expérimentale.

exp_id: "exp_062_ewc_battery_by_temporal_window"

model:
  architecture: "mlp"
  input_dim: 7           # 7 features électrochimiques (Cycle_Index + RUL exclus)
  hidden_dims: [32, 16]
  output_dim: 1
  activation: "relu"
  dropout: 0.2

training:
  optimizer: "sgd"
  learning_rate: 0.01
  momentum: 0.9
  epochs_per_task: 10
  batch_size: 32
  seed: 42

ewc:
  lambda: 1000
  gamma: 0.9
  n_fisher_samples: 200

data:
  dataset: "battery_rul"
  task_split: "by_temporal_window"
  csv_path: "data/raw/Battery Remaining Useful Life (RUL)/Battery_RUL.csv"
  normalizer_path: "configs/battery_normalizer.yaml"
  n_tasks: 3
  rul_failure_threshold: 200   # RUL < 200 cycles → dégradé (label=1) ≈ 18% positifs
  val_ratio: 0.2
  n_features: 7
  n_classes: 2
  label_column: faulty
  feature_columns:
    - "Discharge Time (s)"
    - "Decrement 3.6-3.4V (s)"
    - "Max. Voltage Dischar. (V)"
    - "Min. Voltage Charg. (V)"
    - "Time at 4.15V (s)"
    - "Time constant current (s)"
    - "Charging time (s)"
  # Fenêtres temporelles (par tiers du Cycle_Index 1-1134)
  temporal_windows:
    - [1, 378]      # Task 1 : début de vie
    - [379, 756]    # Task 2 : mi-vie
    - [757, 1134]   # Task 3 : fin de vie (dégradation accélérée)

evaluation:
  seed: 42
  metrics: ["aa", "af", "bwt", "ram_peak_bytes", "n_params", "inference_latency_ms"]
  output_dir: "experiments/exp_062_ewc_battery_by_temporal_window/results/"

memory:
  target_ram_bytes: 65536
  expected_ram_bytes: 6500    # MLP 7→32→16→1 : ~2 016 poids × 4 B + Fisher ≈ 6.5 Ko @ FP32
  warn_if_above_bytes: 52000
