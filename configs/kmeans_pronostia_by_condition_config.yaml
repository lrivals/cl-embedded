# configs/kmeans_pronostia_by_condition_config.yaml
# KMeans Domain-Incremental — Dataset 3 FEMTO PRONOSTIA (3 conditions opératoires)
# Exp : exp_053_kmeans_pronostia_by_condition
# Résout : FIXME(gap1) — données industrielles réelles de roulements
# NE PAS modifier directement : créer une copie pour chaque variante expérimentale.

exp_id: "exp_053_kmeans_pronostia_by_condition"

kmeans:
  k_method: "silhouette"
  k_fixed: 3
  k_min: 2
  k_max: 10
  anomaly_threshold: null
  anomaly_percentile: 95
  n_init: 10
  max_iter: 300
  cl_strategy: "refit"
  ema_alpha: 0.3

data:
  dataset: "pronostia"
  task_split: "by_condition"
  npy_dir: "data/raw/Pronostia dataset/binaries"
  normalizer_path: "configs/pronostia_normalizer.yaml"
  n_conditions: 3
  window_size: 2560
  step_size: 2560
  failure_ratio: 0.10
  val_ratio: 0.2
  n_features: 13
  n_classes: 2
  feature_columns:
    - acc_horiz
    - acc_vert
  condition_map:
    1: [0, 1]
    2: [2, 3]
    3: [4, 5]

evaluation:
  seed: 42
  metrics: ["aa", "af", "bwt", "auroc", "ram_peak_bytes", "n_params", "inference_latency_ms"]
  output_dir: "experiments/exp_053_kmeans_pronostia_by_condition/results/"

memory:
  target_ram_bytes: 65536
  warn_if_above_bytes: 52000
