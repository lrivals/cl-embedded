# configs/ewc_pronostia_by_condition_config.yaml
# EWC Online Domain-Incremental — Dataset 3 FEMTO PRONOSTIA (3 conditions opératoires)
# Exp : exp_050_ewc_pronostia_by_condition
# Résout : FIXME(gap1) — données industrielles réelles de roulements
# NE PAS modifier directement : créer une copie pour chaque variante expérimentale.

exp_id: "exp_050_ewc_pronostia_by_condition"

model:
  architecture: "mlp"
  input_dim: 13         # 13 features Pronostia
                        # MEM: 13 × 4 B = 52 B (entrée)
  hidden_dims: [32, 16]
  output_dim: 1
  activation: "relu"
  dropout: 0.2

training:
  optimizer: "sgd"
  learning_rate: 0.01
  momentum: 0.9
  epochs_per_task: 10
  batch_size: 32
  seed: 42

ewc:
  lambda: 1000
  gamma: 0.9
  n_fisher_samples: 200

data:
  dataset: "pronostia"
  task_split: "by_condition"
  npy_dir: "data/raw/Pronostia dataset/binaries"
  normalizer_path: "configs/pronostia_normalizer.yaml"
  n_conditions: 3
  window_size: 2560
  step_size: 2560
  failure_ratio: 0.10
  val_ratio: 0.2
  n_features: 13
  n_classes: 2
  feature_columns:
    - acc_horiz
    - acc_vert
  condition_map:
    1: [0, 1]   # Condition 1 : 1 800 rpm, 4 000 N (Bearing1_1 + Bearing1_2)
    2: [2, 3]   # Condition 2 : 1 650 rpm, 4 200 N (Bearing2_1 + Bearing2_2)
    3: [4, 5]   # Condition 3 : 1 500 rpm, 5 000 N (Bearing3_1 + Bearing3_2)

evaluation:
  seed: 42
  metrics: ["aa", "af", "bwt", "ram_peak_bytes", "n_params", "inference_latency_ms"]
  output_dir: "experiments/exp_050_ewc_pronostia_by_condition/results/"

memory:
  target_ram_bytes: 65536
  expected_ram_bytes: 9356   # ~9 Ko (poids MLP + Fisher diagonal + snapshot θ*)
  warn_if_above_bytes: 52000
