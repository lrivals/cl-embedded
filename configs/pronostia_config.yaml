# configs/pronostia_config.yaml
# Dataset 3 — FEMTO PRONOSTIA IEEE PHM 2012 (Bearing Degradation)
# Scénario CL : Domain-Incremental par condition opératoire (3 tâches)
# NE PAS modifier directement : créer une copie pour chaque variante expérimentale.
# Résout : FIXME(gap1) — premier résultat CL sur données industrielles réelles de roulements.

exp_id: "exp_050_ewc_pronostia_by_condition"

model:
  architecture: "mlp"
  input_dim: 13          # 13 features = 6 stats × 2 canaux (acc_horiz, acc_vert) + temporal_position
  hidden_dims: [32, 16]
  output_dim: 1
  activation: "relu"
  dropout: 0.2

training:
  optimizer: "sgd"
  learning_rate: 0.01
  momentum: 0.9
  epochs_per_task: 10
  batch_size: 32
  seed: 42

ewc:
  lambda: 1000
  gamma: 0.9
  n_fisher_samples: 200

data:
  dataset: "pronostia"
  task_split: "by_condition"
  npy_dir: "data/raw/Pronostia dataset/binaries"
  normalizer_path: "configs/pronostia_normalizer.yaml"
  n_conditions: 3
  window_size: 2560      # 1 epoch PRONOSTIA = 2 560 points @ 25.6 kHz (0.1 s)
  step_size: 2560        # sans overlap — fenêtres disjointes
  failure_ratio: 0.10    # derniers 10% du signal = pré-défaillance (label=1)
  val_ratio: 0.2
  n_features: 13
  n_classes: 2
  feature_columns:
    - acc_horiz
    - acc_vert
  condition_map:
    1: [0, 1]            # Condition 1 : 1 800 rpm, 4 000 N (Bearing1_1 + Bearing1_2)
    2: [2, 3]            # Condition 2 : 1 650 rpm, 4 200 N (Bearing2_1 + Bearing2_2)
    3: [4, 5]            # Condition 3 : 1 500 rpm, 5 000 N (Bearing3_1 + Bearing3_2)

evaluation:
  seed: 42
  metrics: ["aa", "af", "bwt", "ram_peak_bytes", "n_params", "inference_latency_ms"]
  output_dir: "experiments/exp_050_ewc_pronostia_by_condition/results/"

memory:
  target_ram_bytes: 65536
  expected_ram_bytes: 9356
  warn_if_above_bytes: 52000
