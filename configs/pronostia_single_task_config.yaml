# configs/pronostia_single_task_config.yaml
# Baseline single-task — Dataset 3 FEMTO PRONOSTIA (toutes conditions fusionnées)
# MEM: pas de tâches séquentielles, split train/val/test global stratifié
# Usage : --data_config configs/pronostia_single_task_config.yaml

dataset:
  name: pronostia
  task_split: "no_split"
  test_ratio: 0.2
  val_ratio: 0.1         # sur le train uniquement
  seed: 42
  window_size: 2560
  step_size: 2560
  failure_ratio: 0.10

paths:
  npy_dir: "data/raw/Pronostia dataset/binaries"

data:
  dataset: pronostia
  task_split: "no_split"
  npy_dir: "data/raw/Pronostia dataset/binaries"
  test_ratio: 0.2
  val_ratio: 0.1
  window_size: 2560
  step_size: 2560
  failure_ratio: 0.10
  seed: 42
  n_features: 13
  n_classes: 2
  feature_columns:
    - acc_horiz
    - acc_vert
